spring:
  application:
    name: Aalap-Version1

  servlet:
    multipart:
      max-file-size: 20MB      # Max size for a single file (e.g., one song)
      max-request-size: 20MB

  datasource:
    # Looks for a Render DB URL first, falls back to localhost if not found
    url: ${DB_URL:jdbc:mysql://localhost:3306/aalap}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      # Defaults to validate for production safety, can be overridden to 'update' locally
      ddl-auto: ${DDL_AUTO:validate}
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

jwt:
  # Looks for a production secret, falls back to your local dev string
  secret: ${JWT_SECRET:7f3b9c2e1d4a8f6b0e5c3a9d2f7b1e4c8a3f6d9b2e5c1a4f7b0e3c6a9d2f5b8e1c4a7f0b3d6e9c2a5f8b1e4d7a0c3f6b9e2d5a8c1f4b7e0d3a6f9c2b5e8a1d4f7b0c3e6a9d2f5b8c1e4a7f0b3d6e9}
  expiration: 3600000

logging:
  level:
    org.springframework.security: INFO # Swapped to INFO to keep production logs clean

cloudinary:
  # Notice there are no fallback values here! This forces the app to get them securely from the environment.
  cloud_name: ${CLOUDINARY_CLOUD_NAME}
  api_key: ${CLOUDINARY_API_KEY}
  api_secret: ${CLOUDINARY_API_SECRET}