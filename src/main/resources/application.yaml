spring:
  application:
    name: Aalap-Version1

  servlet:
    multipart:
      max-file-size: 20MB      # Max size for a single file (e.g., one song)
      max-request-size: 20MB

  datasource:
    # Looks for a Render DB URL first, falls back to localhost if not found
    url: ${DB_URL:jdbc:mysql://localhost:3306/aalap}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      # Defaults to validate for production safety, can be overridden to 'update' locally
      ddl-auto: ${DDL_AUTO:validate}
    show-sql: false   # Never log raw SQL in production — set SHOW_SQL=true env var locally if needed
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

jwt:
  # No fallback — app will fail to start if JWT_SECRET env var is not set
  secret: ${JWT_SECRET}
  expiration: 3600000

logging:
  level:
    org.springframework.security: INFO # Swapped to INFO to keep production logs clean

cloudinary:
  # Notice there are no fallback values here! This forces the app to get them securely from the environment.
  cloud_name: ${CLOUDINARY_CLOUD_NAME}
  api_key: ${CLOUDINARY_API_KEY}
  api_secret: ${CLOUDINARY_API_SECRET}

resend:
  # Set RESEND_API_KEY in your environment. Set RESEND_FROM to a verified sender address.
  api-key: ${RESEND_API_KEY:}
  from-address: "${RESEND_FROM:Aalap <onboarding@resend.dev>}"
