spring:
  application:
    name: Aalap-Version1

  servlet:
    multipart:
      max-file-size: 20MB      # Max size for a single file (e.g., one song)
      max-request-size: 20MB

  datasource:
    # TiDB Cloud Serverless URL format:
    # jdbc:mysql://<host>:4000/<database>?sslMode=VERIFY_IDENTITY&enabledTLSProtocols=TLSv1.2,TLSv1.3&serverTimezone=UTC&allowPublicKeyRetrieval=true
    # Make sure the database (e.g. "aalap") is created in TiDB Cloud Console first!
    url: ${DB_URL:jdbc:mysql://localhost:3306/aalap?serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      # TiDB Cloud Serverless free tier has connection limits — keep pool small
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      # Validate connections before use (important for cloud DBs that drop idle connections)
      connection-test-query: SELECT 1
      keepalive-time: 60000

  jpa:
    hibernate:
      # Defaults to validate for production safety, can be overridden to 'update' locally
      ddl-auto: ${DDL_AUTO:update}
    show-sql: ${SHOW_SQL:false}   # Never log raw SQL in production — set SHOW_SQL=true env var locally if needed
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        # TiDB Cloud Serverless compatibility: do NOT let Hibernate try to create the schema/catalog
        hbm2ddl:
          create_namespaces: false
        # Ensures Hibernate uses JDBC batch operations safely with TiDB
        jdbc:
          batch_size: 20
          time_zone: UTC
        # Needed for Hibernate 7 + TiDB: disable legacy identifier quoting that breaks TiDB DDL
        globally_quoted_identifiers: false
        format_sql: false

jwt:
  # No fallback — app will fail to start if JWT_SECRET env var is not set
  secret: ${JWT_SECRET}
  expiration: 3600000

logging:
  level:
    org.springframework.security: INFO # Swapped to INFO to keep production logs clean
    org.hibernate.SQL: ${SHOW_SQL:INFO}

cloudinary:
  # Notice there are no fallback values here! This forces the app to get them securely from the environment.
  cloud_name: ${CLOUDINARY_CLOUD_NAME}
  api_key: ${CLOUDINARY_API_KEY}
  api_secret: ${CLOUDINARY_API_SECRET}

resend:
  # Set RESEND_API_KEY in your environment. Set RESEND_FROM to a verified sender address.
  api-key: ${RESEND_API_KEY:}
  from-address: "${RESEND_FROM:Aalap <onboarding@resend.dev>}"
